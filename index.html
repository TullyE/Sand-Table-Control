<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sand Table Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .connection-section {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .connection-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            transition: background 0.3s ease;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .status-text {
            font-weight: 600;
            color: #666;
            flex: 1;
        }

        .ip-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .ip-input-group input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .ip-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .ip-input-group input::placeholder {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-connect {
            background: #667eea;
            color: white;
        }

        .btn-connect:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-disconnect {
            background: #ef4444;
            color: white;
        }

        .btn-disconnect:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-section {
            display: flex;
            gap: 15px;
        }

        .btn-blink {
            background: #10b981;
            color: white;
            flex: 1;
            padding: 16px;
            font-size: 16px;
        }

        .btn-blink:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-stop {
            background: #f59e0b;
            color: white;
            flex: 1;
            padding: 16px;
            font-size: 16px;
        }

        .btn-stop:hover:not(:disabled) {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .message-box {
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 13px;
            color: #333;
            max-height: 100px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .message-box.error {
            background: #fef2f2;
            border-left-color: #ef4444;
            color: #991b1b;
        }

        .message-box.success {
            background: #f0fdf4;
            border-left-color: #10b981;
            color: #166534;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Sand Table Control</h1>
        <p class="subtitle">Connect to your local ESP32</p>

        <div class="connection-section">
            <div class="connection-label">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>

            <div class="ip-input-group">
                <input 
                    type="text" 
                    id="espIP" 
                    placeholder="192.168.1.50" 
                    value="192.168.1.50"
                >
            </div>

            <div class="button-group">
                <button class="btn-connect" id="connectBtn" onclick="connect()">
                    Connect
                </button>
                <button class="btn-disconnect" id="disconnectBtn" onclick="disconnect()" disabled>
                    Disconnect
                </button>
            </div>
        </div>

        <div class="control-section" id="controlSection" style="display: none;">
            <button class="btn-blink" id="blinkBtn" onclick="startBlink()">
                ✨ Start Blink
            </button>
            <button class="btn-stop" id="stopBtn" onclick="stopBlink()">
                ⏹ Stop Blink
            </button>
        </div>

        <div class="message-box" id="messageBox"></div>
    </div>

    <script>
        let ws = null;
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const espIPInput = document.getElementById('espIP');
        const controlSection = document.getElementById('controlSection');
        const messageBox = document.getElementById('messageBox');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${message}`;
            messageBox.innerHTML += entry + '<br>';
            messageBox.scrollTop = messageBox.scrollHeight;

            // Color the message
            if (type === 'error') {
                messageBox.classList.add('error');
                messageBox.classList.remove('success');
            } else if (type === 'success') {
                messageBox.classList.add('success');
                messageBox.classList.remove('error');
            } else {
                messageBox.classList.remove('error', 'success');
            }

            // Keep only last 10 messages
            const lines = messageBox.innerHTML.split('<br>');
            if (lines.length > 12) {
                messageBox.innerHTML = lines.slice(-10).join('<br>');
            }
        }

        function connect() {
            const ip = espIPInput.value.trim();
            if (!ip) {
                log('Please enter ESP32 IP address', 'error');
                return;
            }

            const wsURL = `ws://${ip}:81`;
            log(`Connecting to ${wsURL}...`, 'info');

            ws = new WebSocket(wsURL);

            ws.onopen = () => {
                log('Connected to ESP32! ✅', 'success');
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                espIPInput.disabled = true;
                controlSection.style.display = 'flex';
            };

            ws.onmessage = (event) => {
                log(`Received: ${event.data}`, 'info');
                const data = JSON.parse(event.data);
                if (data.status) {
                    log(`Status: ${data.status}`, 'success');
                }
            };

            ws.onerror = (error) => {
                log(`WebSocket error: ${error}`, 'error');
            };

            ws.onclose = () => {
                log('Disconnected from ESP32 ❌', 'error');
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                espIPInput.disabled = false;
                controlSection.style.display = 'none';
                ws = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function startBlink() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('start_blink');
                log('Sent: start_blink', 'info');
            } else {
                log('Not connected to ESP32', 'error');
            }
        }

        function stopBlink() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('stop_blink');
                log('Sent: stop_blink', 'info');
            } else {
                log('Not connected to ESP32', 'error');
            }
        }

        // Log initial message
        log('Ready to connect', 'success');
    </script>
</body>
</html>
